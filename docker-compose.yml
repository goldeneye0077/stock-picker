services:
  # PostgreSQL + TimescaleDB
  timescaledb:
    image: ${TIMESCALE_IMAGE:-timescale/timescaledb:latest-pg16}
    container_name: stock-picker-timescaledb
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${TIMESCALE_DB:-stock_picker}
      - POSTGRES_USER=${TIMESCALE_USER:-postgres}
      - POSTGRES_PASSWORD=${TIMESCALE_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:${TIMESCALE_PORT:-5432}:5432"
    volumes:
      - timescale-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER:-postgres} -d ${TIMESCALE_DB:-stock_picker}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - stock-picker-network

  # Redis Cache
  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: stock-picker-redis
    restart: unless-stopped
    networks:
      - stock-picker-network

  # One-shot Timescale schema initializer
  timescaledb-init:
    image: ${TIMESCALE_INIT_IMAGE:-postgres:16-alpine}
    container_name: stock-picker-timescaledb-init
    restart: "no"
    environment:
      - PGPASSWORD=${TIMESCALE_PASSWORD:-postgres}
    volumes:
      - ./scripts/migrate/timescaledb_schema.sql:/schema/timescaledb_schema.sql:ro
    command:
      [
        "sh",
        "-lc",
        "until pg_isready -h timescaledb -p 5432 -U ${TIMESCALE_USER:-postgres} -d ${TIMESCALE_DB:-stock_picker}; do sleep 2; done; psql -v ON_ERROR_STOP=1 -h timescaledb -p 5432 -U ${TIMESCALE_USER:-postgres} -d ${TIMESCALE_DB:-stock_picker} -f /schema/timescaledb_schema.sql",
      ]
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - stock-picker-network

  # Backend API Service
  backend:
    image: ${BACKEND_IMAGE:-stock-picker-backend}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stock-picker-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_PORT:-3100}:3000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - MARKET_EVENT_CHANNEL=${MARKET_EVENT_CHANNEL:-market:events}
      - TIMESCALE_ENABLED=${TIMESCALE_ENABLED:-true}
      - TIMESCALE_URL=${TIMESCALE_URL:-postgresql://postgres:postgres@timescaledb:5432/stock_picker}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD?ADMIN_PASSWORD is required}
      - DATA_SERVICE_URL=http://data-service:8001
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@timescaledb:5432/stock_picker}
      - FRONTEND_URL=${FRONTEND_URL:-}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    depends_on:
      redis:
        condition: service_started
      timescaledb:
        condition: service_healthy
      timescaledb-init:
        condition: service_completed_successfully
    networks:
      - stock-picker-network

  # Python Data Service
  data-service:
    image: ${DATA_SERVICE_IMAGE:-stock-picker-data-service}
    build:
      context: ./data-service
      dockerfile: Dockerfile
    container_name: stock-picker-data-service
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DATA_SERVICE_PORT:-8001}:8001"
    env_file:
      - ./data-service/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - REDIS_PUBSUB_ENABLED=${REDIS_PUBSUB_ENABLED:-true}
      - MARKET_EVENT_CHANNEL=${MARKET_EVENT_CHANNEL:-market:events}
      - TIMESCALE_ENABLED=${TIMESCALE_ENABLED:-true}
      - TIMESCALE_URL=${TIMESCALE_URL:-postgresql://postgres:postgres@timescaledb:5432/stock_picker}
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@timescaledb:5432/stock_picker}
      - SESSION_EXPIRE_DAYS=${SESSION_EXPIRE_DAYS:-7}
      - ENABLE_SCHEDULED_AUCTION_COLLECTION=${ENABLE_SCHEDULED_AUCTION_COLLECTION:-true}
      - ENABLE_SCHEDULED_DAILY_KLINES=${ENABLE_SCHEDULED_DAILY_KLINES:-true}
      - CLOSE_COLLECT_MAX_ATTEMPTS=${CLOSE_COLLECT_MAX_ATTEMPTS:-5}
      - CLOSE_COLLECT_RETRY_INTERVAL_SEC=${CLOSE_COLLECT_RETRY_INTERVAL_SEC:-300}
    command:
      [
        "sh",
        "-lc",
        "exec uvicorn src.main:app --host 0.0.0.0 --port 8001",
      ]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    depends_on:
      redis:
        condition: service_started
      timescaledb:
        condition: service_healthy
      timescaledb-init:
        condition: service_completed_successfully
    networks:
      - stock-picker-network

  # Frontend Web App
  frontend:
    image: ${FRONTEND_IMAGE:-stock-picker-frontend}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_DATA_SERVICE_URL: /data-service
    container_name: stock-picker-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3101}:80"
    healthcheck:
      test: ["CMD-SHELL", "test -f /usr/share/nginx/html/index.html"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s
    depends_on:
      - backend
    networks:
      - stock-picker-network

networks:
  stock-picker-network:
    driver: bridge

volumes:
  timescale-data:
