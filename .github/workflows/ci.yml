name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:
    inputs:
      publish_images:
        description: Publish images to GHCR
        type: boolean
        default: false
      deploy:
        description: Deploy to Ubuntu via SSH
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read

env:
  CODECOV_ENABLED: ${{ vars.CODECOV_ENABLED || 'false' }}
  ARTIFACTS_ENABLED: ${{ vars.ARTIFACTS_ENABLED || 'false' }}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      data_service: ${{ steps.filter.outputs.data_service }}
      specs: ${{ steps.filter.outputs.specs }}
      ops_runtime: ${{ steps.filter.outputs.ops_runtime }}
      ci_only: ${{ steps.filter.outputs.ci_only }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    - name: Compute diff base
      id: diff_base
      shell: bash
      run: |
        ZERO_SHA="0000000000000000000000000000000000000000"
        DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
        BASE_SHA=""

        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
        elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "${ZERO_SHA}" ]; then
          BASE_SHA="${{ github.event.before }}"
        elif [ -n "${DEFAULT_BRANCH}" ] && git rev-parse "origin/${DEFAULT_BRANCH}" >/dev/null 2>&1; then
          BASE_SHA="$(git rev-parse "origin/${DEFAULT_BRANCH}")"
        elif git rev-parse HEAD^ >/dev/null 2>&1; then
          BASE_SHA="$(git rev-parse HEAD^)"
        else
          BASE_SHA="$(git rev-parse HEAD)"
        fi

        echo "base=${BASE_SHA}" >> "$GITHUB_OUTPUT"
    - name: Filter paths
      id: filter
      uses: dorny/paths-filter@v3
      with:
        base: ${{ steps.diff_base.outputs.base }}
        ref: ${{ github.sha }}
        filters: |
          backend:
            - 'backend/**'
          frontend:
            - 'frontend/**'
          data_service:
            - 'data-service/**'
          specs:
            - 'specs/**'
            - '.github/workflows/validate-specs.yml'
            - '.github/workflows/ci.yml'
          ops_runtime:
            - 'docker-compose.yml'
            - 'backend/Dockerfile'
            - 'frontend/Dockerfile'
            - 'data-service/Dockerfile'
          ci_only:
            - '.github/workflows/**'

  validate-specs:
    name: Validate OpenAPI Specifications
    uses: ./.github/workflows/validate-specs.yml
    needs: changes
    if: needs.changes.outputs.specs == 'true'

  gate-checks:
    name: Gate Checks
    runs-on: ubuntu-latest
    needs: changes
    if: always()
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    - name: Verify Python baseline
      run: |
        python3 -V
        if ! grep -qE '^FROM python:3\.12' data-service/Dockerfile; then
          echo "data-service/Dockerfile must use python:3.12 base image"
          exit 1
        fi
    - name: Verify compose healthchecks
      run: |
        if ! grep -q 'healthcheck:' docker-compose.yml; then
          echo "docker-compose.yml must define healthchecks"
          exit 1
        fi
        if ! grep -qE 'service:.*backend|backend:' docker-compose.yml; then
          echo "docker-compose.yml missing backend service"
          exit 1
        fi
        if ! grep -qE 'service:.*data-service|data-service:' docker-compose.yml; then
          echo "docker-compose.yml missing data-service service"
          exit 1
        fi

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: [changes, validate-specs]
    if: |
      always() &&
      (
        needs.changes.outputs.backend == 'true' ||
        needs.changes.outputs.ops_runtime == 'true' ||
        needs.changes.outputs.ci_only == 'true' ||
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/master' ||
        github.ref == 'refs/heads/develop'
      ) &&
      (needs.validate-specs.result == 'success' || needs.validate-specs.result == 'skipped')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'package-lock.json'

    - name: Install backend dependencies
      run: |
        npm install

    - name: Run backend tests
      run: |
        npm test -w stock-picker-backend
      env:
        NODE_ENV: test

    - name: Upload test coverage
      if: env.CODECOV_ENABLED == 'true'
      continue-on-error: true
      uses: codecov/codecov-action@v4
      with:
        directory: backend/coverage
        flags: backend

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: [changes, validate-specs]
    if: |
      always() &&
      (
        needs.changes.outputs.frontend == 'true' ||
        needs.changes.outputs.ops_runtime == 'true' ||
        needs.changes.outputs.ci_only == 'true' ||
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/master' ||
        github.ref == 'refs/heads/develop'
      ) &&
      (needs.validate-specs.result == 'success' || needs.validate-specs.result == 'skipped')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'package-lock.json'

    - name: Install frontend dependencies
      run: |
        npm install

    - name: Run frontend tests
      run: |
        npm test -w stock-picker-frontend -- --run
      env:
        NODE_ENV: test

    - name: Upload test coverage
      if: env.CODECOV_ENABLED == 'true'
      continue-on-error: true
      uses: codecov/codecov-action@v4
      with:
        directory: frontend/coverage
        flags: frontend

  test-data-service:
    name: Test Data Service
    runs-on: ubuntu-latest
    needs: [changes, validate-specs]
    if: |
      always() &&
      (
        needs.changes.outputs.data_service == 'true' ||
        needs.changes.outputs.ops_runtime == 'true' ||
        needs.changes.outputs.ci_only == 'true' ||
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/master' ||
        github.ref == 'refs/heads/develop'
      ) &&
      (needs.validate-specs.result == 'success' || needs.validate-specs.result == 'skipped')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install data service dependencies
      run: |
        cd data-service
        pip install -r requirements.txt

    - name: Run data service tests
      run: |
        cd data-service
        if find . -type f \( -name 'test_*.py' -o -name '*_test.py' \) -print -quit | grep -q .; then
          python -m pytest
        else
          echo "No pytest tests found; skipping."
        fi
      env:
        NODE_ENV: test

  build:
    name: Build All Services
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-data-service]
    if: |
      always() &&
      (needs.test-backend.result == 'success' || needs.test-backend.result == 'skipped') &&
      (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped') &&
      (needs.test-data-service.result == 'success' || needs.test-data-service.result == 'skipped')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'package-lock.json'

    - name: Install Node.js dependencies
      run: |
        npm install

    - name: Build backend
      run: |
        npm run build -w stock-picker-backend

    - name: Build frontend
      run: |
        npm run build -w stock-picker-frontend

    - name: Upload build artifacts
      if: env.ARTIFACTS_ENABLED == 'true'
      continue-on-error: true
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          backend/dist/
          frontend/dist/
        retention-days: 7

  smoke-docker-compose:
    name: Smoke Test (Docker Compose)
    runs-on: ubuntu-latest
    needs: [changes, gate-checks, validate-specs]
    env:
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: CI_admin!2026_Smoke
      REDIS_IMAGE: redis:7-alpine
    if: |
      always() &&
      github.event_name == 'workflow_dispatch' &&
      (inputs.publish_images == true || inputs.deploy == true) &&
      needs.gate-checks.result == 'success' &&
      (needs.validate-specs.result == 'success' || needs.validate-specs.result == 'skipped')
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    - name: Prepare compose env files
      run: |
        mkdir -p data-service
        if [ ! -f data-service/.env ]; then
          printf 'TUSHARE_TOKEN=\n' > data-service/.env
        fi
    - name: Build and start services
      run: |
        set -euo pipefail
        docker compose up -d --build || (docker compose ps && docker compose logs --no-color --tail=200 && exit 1)
    - name: Wait for services
      run: |
        set -e
        for i in {1..60}; do
          backend_h=$(docker inspect -f '{{.State.Health.Status}}' stock-picker-backend 2>/dev/null || true)
          data_h=$(docker inspect -f '{{.State.Health.Status}}' stock-picker-data-service 2>/dev/null || true)
          frontend_h=$(docker inspect -f '{{.State.Health.Status}}' stock-picker-frontend 2>/dev/null || true)
          if [ "$backend_h" = "healthy" ] && [ "$data_h" = "healthy" ] && [ "$frontend_h" = "healthy" ]; then exit 0; fi
          sleep 2
        done
        docker compose ps
        docker compose logs --no-color --tail=200
        exit 1
    - name: Smoke requests
      run: |
        curl -fsS http://localhost:3100/health >/dev/null
        curl -fsS http://localhost:8001/health >/dev/null
        curl -fsS http://localhost:3101/ >/dev/null
        curl -fsS http://localhost:3101/data-service/health >/dev/null
        curl -fsS http://localhost:3101/data-service/api/smart-selection/strategies >/dev/null
    - name: Tear down
      if: always()
      run: |
        docker compose down -v

  build-docker-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' && needs.build.result == 'success'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker images
      run: |
        docker build -t stock-picker-backend ./backend
        docker build -t stock-picker-frontend --build-arg VITE_DATA_SERVICE_URL=/data-service --build-arg VITE_API_BASE_URL= ./frontend
        docker build -t stock-picker-data-service ./data-service

  publish-ghcr:
    name: Publish Images (GHCR)
    runs-on: ubuntu-latest
    needs: [changes, smoke-docker-compose, build]
    if: |
      always() &&
      (
        (github.event_name == 'push' &&
         (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop') &&
         (needs['smoke-docker-compose'].result == 'success' || needs['smoke-docker-compose'].result == 'skipped') &&
         (needs.build.result == 'success' || needs.build.result == 'skipped'))
        ||
        (github.event_name == 'workflow_dispatch' &&
         (inputs.publish_images == true || inputs.deploy == true) &&
         (needs['smoke-docker-compose'].result == 'success' || needs['smoke-docker-compose'].result == 'skipped') &&
         (needs.build.result == 'success' || needs.build.result == 'skipped'))
      )
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Mirror TimescaleDB image to GHCR
      run: |
        set -euo pipefail
        SRC_IMAGE="timescale/timescaledb:latest-pg16"
        DEST_IMAGE="ghcr.io/${{ github.repository_owner }}/stock-picker-timescaledb:latest-pg16"
        mirror_ok=0
        for i in 1 2 3; do
          if docker pull "${SRC_IMAGE}"; then
            mirror_ok=1
            break
          fi
          echo "timescaledb pull failed (attempt ${i}/3), retrying in 10s..."
          sleep 10
        done
        if [ "${mirror_ok}" -ne 1 ]; then
          echo "timescaledb mirror pull failed after retries"
          exit 1
        fi
        docker tag "${SRC_IMAGE}" "${DEST_IMAGE}"
        docker push "${DEST_IMAGE}"

    - name: Backend image metadata
      id: meta_backend
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository_owner }}/stock-picker-backend
        tags: |
          type=sha,format=long
          type=ref,event=branch
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Frontend image metadata
      id: meta_frontend
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository_owner }}/stock-picker-frontend
        tags: |
          type=sha,format=long
          type=ref,event=branch
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Data service image metadata
      id: meta_data_service
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository_owner }}/stock-picker-data-service
        tags: |
          type=sha,format=long
          type=ref,event=branch
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push backend
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        push: true
        tags: ${{ steps.meta_backend.outputs.tags }}
        labels: ${{ steps.meta_backend.outputs.labels }}

    - name: Build and push frontend
      uses: docker/build-push-action@v6
      with:
        context: ./frontend
        push: true
        tags: ${{ steps.meta_frontend.outputs.tags }}
        labels: ${{ steps.meta_frontend.outputs.labels }}
        build-args: |
          VITE_DATA_SERVICE_URL=/data-service
          VITE_API_BASE_URL=

    - name: Build and push data service
      uses: docker/build-push-action@v6
      with:
        context: ./data-service
        file: ./data-service/Dockerfile
        push: true
        tags: ${{ steps.meta_data_service.outputs.tags }}
        labels: ${{ steps.meta_data_service.outputs.labels }}

  deploy-ubuntu:
    name: Deploy (Ubuntu via SSH)
    runs-on: ubuntu-latest
    needs: publish-ghcr
    if: |
      always() &&
      (
        (github.event_name == 'push' && needs['publish-ghcr'].result == 'success')
        ||
        (github.event_name == 'workflow_dispatch' && inputs.deploy == true && needs['publish-ghcr'].result == 'success')
      )
    concurrency:
      group: stock-picker-deploy-${{ github.ref }}
      cancel-in-progress: true
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    - name: Check deploy secrets
      id: check
      run: |
        if [ -n "${{ secrets.DEPLOY_SSH_HOST }}" ] && [ -n "${{ secrets.DEPLOY_SSH_USER }}" ] && [ -n "${{ secrets.DEPLOY_SSH_KEY }}" ] && [ -n "${{ secrets.DEPLOY_ADMIN_PASSWORD }}" ]; then
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        echo "enabled=false" >> "$GITHUB_OUTPUT"
        echo "DEPLOY_SSH_HOST/DEPLOY_SSH_USER/DEPLOY_SSH_KEY/DEPLOY_ADMIN_PASSWORD not set; skipping deploy."
    - name: Ensure deploy directory
      if: steps.check.outputs.enabled == 'true'
      uses: appleboy/ssh-action@v1.0.3
      env:
        DEPLOY_ADMIN_PASSWORD: ${{ secrets.DEPLOY_ADMIN_PASSWORD }}
        DEPLOY_FRONTEND_ORIGIN: ${{ secrets.DEPLOY_FRONTEND_ORIGIN }}
        DEPLOY_CORS_ALLOW_ORIGINS: ${{ secrets.DEPLOY_CORS_ALLOW_ORIGINS }}
      with:
        host: ${{ secrets.DEPLOY_SSH_HOST }}
        username: ${{ secrets.DEPLOY_SSH_USER }}
        key: ${{ secrets.DEPLOY_SSH_KEY }}
        port: ${{ secrets.DEPLOY_SSH_PORT != '' && secrets.DEPLOY_SSH_PORT || '22' }}
        envs: DEPLOY_ADMIN_PASSWORD,DEPLOY_FRONTEND_ORIGIN,DEPLOY_CORS_ALLOW_ORIGINS
        script: |
          set -euo pipefail
          DEPLOY_DIR="/home/${{ secrets.DEPLOY_SSH_USER }}/stock-picker"
          SSH_HOST="${{ secrets.DEPLOY_SSH_HOST }}"
          mkdir -p "${DEPLOY_DIR}"
          mkdir -p "${DEPLOY_DIR}/scripts"
          mkdir -p "${DEPLOY_DIR}/scripts/migrate"
          mkdir -p "${DEPLOY_DIR}/data"
          mkdir -p "${DEPLOY_DIR}/data-service"
          ROOT_ENV="${DEPLOY_DIR}/.env"
          touch "${ROOT_ENV}"
          pw="${DEPLOY_ADMIN_PASSWORD:-}"
          if [ "${#pw}" -lt 12 ] || ! printf '%s' "${pw}" | grep -q '[A-Z]' || ! printf '%s' "${pw}" | grep -q '[a-z]' || ! printf '%s' "${pw}" | grep -q '[0-9]' || ! printf '%s' "${pw}" | grep -q '[^A-Za-z0-9]'; then
            echo "DEPLOY_ADMIN_PASSWORD does not meet production password complexity requirements"
            exit 1
          fi
          frontend_origin="${DEPLOY_FRONTEND_ORIGIN:-}"
          if [ -z "${frontend_origin}" ]; then
            frontend_origin="http://${SSH_HOST}:3101"
          fi
          cors_allow_origins="${DEPLOY_CORS_ALLOW_ORIGINS:-}"
          if [ -z "${cors_allow_origins}" ]; then
            cors_allow_origins="${frontend_origin},http://${SSH_HOST}:3101,https://${SSH_HOST}:3101,http://${SSH_HOST},https://${SSH_HOST},http://localhost:3101,http://127.0.0.1:3101"
          fi
          tmp_env="$(mktemp)"
          grep -vE '^(ADMIN_USERNAME|ADMIN_PASSWORD|FRONTEND_URL|CORS_ALLOW_ORIGINS)=' "${ROOT_ENV}" > "${tmp_env}" || true
          printf 'ADMIN_USERNAME=admin\n' >> "${tmp_env}"
          printf 'ADMIN_PASSWORD=%s\n' "${pw}" >> "${tmp_env}"
          printf 'FRONTEND_URL=%s\n' "${frontend_origin}" >> "${tmp_env}"
          printf 'CORS_ALLOW_ORIGINS=%s\n' "${cors_allow_origins}" >> "${tmp_env}"
          mv "${tmp_env}" "${ROOT_ENV}"
          chmod 600 "${ROOT_ENV}"
          if [ ! -f "${DEPLOY_DIR}/data-service/.env" ]; then
            printf 'TUSHARE_TOKEN=\n' > "${DEPLOY_DIR}/data-service/.env"
          fi
          ls -la "${DEPLOY_DIR}"
    - name: Upload deploy files (scp with retry)
      if: steps.check.outputs.enabled == 'true'
      shell: bash
      run: |
        set -euo pipefail
        HOST="${{ secrets.DEPLOY_SSH_HOST }}"
        USER="${{ secrets.DEPLOY_SSH_USER }}"
        PORT="${{ secrets.DEPLOY_SSH_PORT != '' && secrets.DEPLOY_SSH_PORT || '22' }}"
        DEPLOY_DIR="/home/${USER}/stock-picker"

        install -m 700 -d ~/.ssh
        printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key

        upload_ok=0
        for i in 1 2 3; do
          if scp -P "${PORT}" -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no docker-compose.yml "${USER}@${HOST}:${DEPLOY_DIR}/docker-compose.yml" \
            && scp -P "${PORT}" -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no scripts/migrate/timescaledb_schema.sql "${USER}@${HOST}:${DEPLOY_DIR}/scripts/migrate/timescaledb_schema.sql"; then
            upload_ok=1
            break
          fi
          echo "scp upload failed (attempt ${i}/3), retrying in 10s..."
          sleep 10
        done

        if [ "${upload_ok}" -ne 1 ]; then
          echo "scp upload failed after retries"
          exit 1
        fi
    - name: Deploy phase 1 (pull app images)
      if: steps.check.outputs.enabled == 'true'
      uses: appleboy/ssh-action@v1.0.3
      env:
        GHCR_DEPLOY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GHCR_DEPLOY_USER: ${{ github.actor }}
      with:
        host: ${{ secrets.DEPLOY_SSH_HOST }}
        username: ${{ secrets.DEPLOY_SSH_USER }}
        key: ${{ secrets.DEPLOY_SSH_KEY }}
        port: ${{ secrets.DEPLOY_SSH_PORT != '' && secrets.DEPLOY_SSH_PORT || '22' }}
        command_timeout: 60m
        envs: GHCR_DEPLOY_TOKEN,GHCR_DEPLOY_USER
        script: |
          set -euo pipefail
          DEPLOY_DIR="/home/${{ secrets.DEPLOY_SSH_USER }}/stock-picker"
          cd "${DEPLOY_DIR}"
          export OWNER="${{ github.repository_owner }}"
          export TAG="sha-${{ github.sha }}"
          export BACKEND_IMAGE="ghcr.io/${OWNER}/stock-picker-backend:${TAG}"
          export FRONTEND_IMAGE="ghcr.io/${OWNER}/stock-picker-frontend:${TAG}"
          export DATA_SERVICE_IMAGE="ghcr.io/${OWNER}/stock-picker-data-service:${TAG}"
          login_ok=0
          for i in 1 2 3; do
            if timeout 60s sh -lc 'printf "%s\n" "$GHCR_DEPLOY_TOKEN" | docker login ghcr.io -u "$GHCR_DEPLOY_USER" --password-stdin'; then
              login_ok=1
              break
            fi
            echo "ghcr login failed (attempt ${i}/3), retrying in 10s..."
            sleep 10
          done
          if [ "${login_ok}" -ne 1 ]; then
            echo "warning: ghcr login failed after retries, continuing with anonymous pulls"
          fi

          pull_image() {
            service_name="$1"
            image_ref="$2"
            pull_ok=0
            started_at="$(date +%s)"
            for i in 1 2; do
              echo "pulling ${service_name} image ${image_ref} (attempt ${i}/2)"
              if timeout 20m docker pull "${image_ref}"; then
                pull_ok=1
                break
              fi
              echo "${service_name} image pull failed (attempt ${i}/2), retrying in 10s..."
              sleep 10
            done
            if [ "${pull_ok}" -ne 1 ]; then
              echo "${service_name} image pull failed after retries"
              exit 1
            fi
            finished_at="$(date +%s)"
            echo "pulled ${service_name} image in $((finished_at - started_at))s"
          }

          pull_image backend "${BACKEND_IMAGE}"
          pull_image frontend "${FRONTEND_IMAGE}"
          pull_image data-service "${DATA_SERVICE_IMAGE}"

    - name: Deploy phase 2a (prepare infra images)
      if: steps.check.outputs.enabled == 'true'
      uses: appleboy/ssh-action@v1.0.3
      env:
        GHCR_DEPLOY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GHCR_DEPLOY_USER: ${{ github.actor }}
      with:
        host: ${{ secrets.DEPLOY_SSH_HOST }}
        username: ${{ secrets.DEPLOY_SSH_USER }}
        key: ${{ secrets.DEPLOY_SSH_KEY }}
        port: ${{ secrets.DEPLOY_SSH_PORT != '' && secrets.DEPLOY_SSH_PORT || '22' }}
        command_timeout: 60m
        envs: GHCR_DEPLOY_TOKEN,GHCR_DEPLOY_USER
        script: |
          set -euo pipefail
          DEPLOY_DIR="/home/${{ secrets.DEPLOY_SSH_USER }}/stock-picker"
          cd "${DEPLOY_DIR}"
          export OWNER="${{ github.repository_owner }}"
          export TIMESCALE_IMAGE="ghcr.io/${OWNER}/stock-picker-timescaledb:latest-pg16"
          export REDIS_IMAGE="${REDIS_IMAGE:-registry.openanolis.cn/openanolis/redis:5.0.3-8.6}"
          login_ok=0
          for i in 1 2 3; do
            if timeout 60s sh -lc 'printf "%s\n" "$GHCR_DEPLOY_TOKEN" | docker login ghcr.io -u "$GHCR_DEPLOY_USER" --password-stdin'; then
              login_ok=1
              break
            fi
            echo "ghcr login failed (attempt ${i}/3), retrying in 10s..."
            sleep 10
          done
          if [ "${login_ok}" -ne 1 ]; then
            echo "warning: ghcr login failed after retries, continuing with anonymous pull"
          fi
          tsdb_h="$(docker inspect -f '{{.State.Health.Status}}' stock-picker-timescaledb 2>/dev/null || true)"
          if [ "${tsdb_h}" = "healthy" ]; then
            echo "timescaledb container already healthy; ensuring redis service only"
            if ! timeout 5m docker compose -f "${DEPLOY_DIR}/docker-compose.yml" up -d --no-build --pull never redis; then
              echo "failed to ensure redis service"
              docker compose -f "${DEPLOY_DIR}/docker-compose.yml" ps || true
              docker compose -f "${DEPLOY_DIR}/docker-compose.yml" logs --no-color --tail=200 redis || true
              exit 1
            fi
          fi
          if ! docker image inspect "${TIMESCALE_IMAGE}" >/dev/null 2>&1; then
            ts_pull_ok=0
            for src in "${TIMESCALE_IMAGE}" "timescale/timescaledb:latest-pg16"; do
              if timeout 20m docker pull "${src}"; then
                if [ "${src}" != "${TIMESCALE_IMAGE}" ]; then
                  docker tag "${src}" "${TIMESCALE_IMAGE}"
                fi
                ts_pull_ok=1
                break
              fi
              echo "timescaledb image pull failed for ${src}, trying next source..."
              if [ "${ts_pull_ok}" -eq 1 ]; then
                break
              fi
            done
            if [ "${ts_pull_ok}" -ne 1 ]; then
              echo "timescaledb image pull failed after GHCR + Docker Hub retries"
              exit 1
            fi
          fi
          if ! docker image inspect "${REDIS_IMAGE}" >/dev/null 2>&1; then
            redis_pull_ok=0
            for i in 1 2 3; do
              if timeout 5m docker pull "${REDIS_IMAGE}"; then
                redis_pull_ok=1
                break
              fi
              echo "redis image pull failed (attempt ${i}/3), retrying in 10s..."
              sleep 10
            done
            if [ "${redis_pull_ok}" -ne 1 ]; then
              echo "redis image pull failed after retries"
              exit 1
            fi
          fi

    - name: Deploy phase 2b (start infra)
      if: steps.check.outputs.enabled == 'true'
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.DEPLOY_SSH_HOST }}
        username: ${{ secrets.DEPLOY_SSH_USER }}
        key: ${{ secrets.DEPLOY_SSH_KEY }}
        port: ${{ secrets.DEPLOY_SSH_PORT != '' && secrets.DEPLOY_SSH_PORT || '22' }}
        command_timeout: 30m
        script: |
          set -euo pipefail
          DEPLOY_DIR="/home/${{ secrets.DEPLOY_SSH_USER }}/stock-picker"
          cd "${DEPLOY_DIR}"
          export OWNER="${{ github.repository_owner }}"
          export TIMESCALE_IMAGE="ghcr.io/${OWNER}/stock-picker-timescaledb:latest-pg16"
          export REDIS_IMAGE="${REDIS_IMAGE:-registry.openanolis.cn/openanolis/redis:5.0.3-8.6}"
          if ! timeout 10m docker compose -f "${DEPLOY_DIR}/docker-compose.yml" up -d --no-build --pull never redis timescaledb; then
            echo "failed to start infra services"
            docker compose -f "${DEPLOY_DIR}/docker-compose.yml" ps || true
            docker compose -f "${DEPLOY_DIR}/docker-compose.yml" logs --no-color --tail=200 redis timescaledb || true
            exit 1
          fi
          for i in $(seq 1 90); do
            tsdb_h="$(docker inspect -f '{{.State.Health.Status}}' stock-picker-timescaledb 2>/dev/null || true)"
            if [ "${tsdb_h}" = "healthy" ]; then
              break
            fi
            sleep 2
          done
          tsdb_h="$(docker inspect -f '{{.State.Health.Status}}' stock-picker-timescaledb 2>/dev/null || true)"
          if [ "${tsdb_h}" != "healthy" ]; then
            echo "timescaledb is not healthy"
            docker logs --tail=200 stock-picker-timescaledb || true
            exit 1
          fi

    - name: Deploy phase 3 (apply schema)
      if: steps.check.outputs.enabled == 'true'
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.DEPLOY_SSH_HOST }}
        username: ${{ secrets.DEPLOY_SSH_USER }}
        key: ${{ secrets.DEPLOY_SSH_KEY }}
        port: ${{ secrets.DEPLOY_SSH_PORT != '' && secrets.DEPLOY_SSH_PORT || '22' }}
        command_timeout: 180m
        script: |
          set -euo pipefail
          DEPLOY_DIR="/home/${{ secrets.DEPLOY_SSH_USER }}/stock-picker"
          cd "${DEPLOY_DIR}"
          SCHEMA_FILE="${DEPLOY_DIR}/scripts/migrate/timescaledb_schema.sql"
          if [ ! -f "${SCHEMA_FILE}" ]; then
            fallback_schema="$(find "${DEPLOY_DIR}" -maxdepth 6 -type f -name timescaledb_schema.sql | head -n 1 || true)"
            if [ -n "${fallback_schema}" ] && [ -f "${fallback_schema}" ]; then
              mkdir -p "$(dirname "${SCHEMA_FILE}")"
              cp "${fallback_schema}" "${SCHEMA_FILE}"
            fi
          fi
          if [ ! -f "${SCHEMA_FILE}" ]; then
            echo "schema file not found: ${SCHEMA_FILE}"
            exit 1
          fi
          docker cp "${SCHEMA_FILE}" stock-picker-timescaledb:/tmp/timescaledb_schema.sql
          docker exec \
            -e PGPASSWORD="${TIMESCALE_PASSWORD:-postgres}" \
            stock-picker-timescaledb \
            sh -lc "psql -v ON_ERROR_STOP=1 -U ${TIMESCALE_USER:-postgres} -d ${TIMESCALE_DB:-stock_picker} -f /tmp/timescaledb_schema.sql"

    - name: Deploy phase 4 (start app)
      if: steps.check.outputs.enabled == 'true'
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.DEPLOY_SSH_HOST }}
        username: ${{ secrets.DEPLOY_SSH_USER }}
        key: ${{ secrets.DEPLOY_SSH_KEY }}
        port: ${{ secrets.DEPLOY_SSH_PORT != '' && secrets.DEPLOY_SSH_PORT || '22' }}
        command_timeout: 180m
        script: |
          set -euo pipefail
          DEPLOY_DIR="/home/${{ secrets.DEPLOY_SSH_USER }}/stock-picker"
          cd "${DEPLOY_DIR}"
          export OWNER="${{ github.repository_owner }}"
          export TAG="sha-${{ github.sha }}"
          export BACKEND_IMAGE="ghcr.io/${OWNER}/stock-picker-backend:${TAG}"
          export FRONTEND_IMAGE="ghcr.io/${OWNER}/stock-picker-frontend:${TAG}"
          export DATA_SERVICE_IMAGE="ghcr.io/${OWNER}/stock-picker-data-service:${TAG}"
          export TIMESCALE_IMAGE="ghcr.io/${OWNER}/stock-picker-timescaledb:latest-pg16"
          export REDIS_IMAGE="${REDIS_IMAGE:-registry.openanolis.cn/openanolis/redis:5.0.3-8.6}"
          docker compose -f "${DEPLOY_DIR}/docker-compose.yml" up -d --remove-orphans --no-build --no-deps backend data-service frontend
          docker compose -f "${DEPLOY_DIR}/docker-compose.yml" ps
          for i in $(seq 1 150); do
            backend_h="$(docker inspect -f '{{.State.Health.Status}}' stock-picker-backend 2>/dev/null || true)"
            data_h="$(docker inspect -f '{{.State.Health.Status}}' stock-picker-data-service 2>/dev/null || true)"
            frontend_h="$(docker inspect -f '{{.State.Health.Status}}' stock-picker-frontend 2>/dev/null || true)"
            if [ "${backend_h}" = "healthy" ] && [ "${data_h}" = "healthy" ] && [ "${frontend_h}" = "healthy" ]; then
              break
            fi
            sleep 2
          done

    - name: Deploy phase 5 (verify health)
      if: steps.check.outputs.enabled == 'true'
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.DEPLOY_SSH_HOST }}
        username: ${{ secrets.DEPLOY_SSH_USER }}
        key: ${{ secrets.DEPLOY_SSH_KEY }}
        port: ${{ secrets.DEPLOY_SSH_PORT != '' && secrets.DEPLOY_SSH_PORT || '22' }}
        command_timeout: 180m
        script: |
          set -euo pipefail
          curl -fsS http://localhost:3100/health >/dev/null
          curl -fsS http://localhost:8001/health >/dev/null
          curl -fsS http://localhost:3101/ >/dev/null
          today_sh="$(TZ=Asia/Shanghai date +%F)"
          echo "Best-effort auction catch-up for ${today_sh}"
          curl -fsS -X POST "http://localhost:8001/api/quotes/update-auction?sync=true&trade_date=${today_sh}" || true

    - name: Deploy phase 6 (verify public endpoints)
      if: steps.check.outputs.enabled == 'true'
      env:
        PUBLIC_BASE_URL: ${{ secrets.DEPLOY_FRONTEND_ORIGIN != '' && secrets.DEPLOY_FRONTEND_ORIGIN || format('http://{0}', secrets.DEPLOY_SSH_HOST) }}
      run: |
        set -euo pipefail
        node scripts/ops/verify_public_endpoints.js "${PUBLIC_BASE_URL}"

  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [changes, validate-specs, test-backend, test-frontend, test-data-service, build]
    if: always()
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
    - name: Send Slack notification
      if: ${{ env.SLACK_WEBHOOK_URL != '' }}
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#ci-cd'
        username: 'CI/CD Bot'
        icon_emoji: ':robot_face:'

    - name: Update PR status
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const allJobs = ${{ toJSON(needs) }};
          const failedJobs = Object.entries(allJobs)
            .filter(([jobName, job]) => job.result === 'failure')
            .map(([jobName]) => jobName);

          const success = failedJobs.length === 0;

          const emoji = success ? '✅' : '❌';
          const status = success ? 'SUCCESS' : 'FAILURE';

          const report = `
          ## CI/CD Pipeline ${emoji}

          **Overall Status:** ${status}

          ### Job Results
          ${Object.entries(allJobs).map(([jobName, job]) => {
            const jobEmoji = job.result === 'success' ? '✅' :
                           job.result === 'failure' ? '❌' : '⚠️';
            return `- ${jobEmoji} ${jobName}: ${job.result || 'pending'}`;
          }).join('\n')}

          ${failedJobs.length > 0 ? `
          ### Failed Jobs
          ${failedJobs.map(job => `- ${job}`).join('\n')}
          ` : ''}

          ### Details
          [View full pipeline](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          `;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const botComment = comments.find(comment =>
            comment.user.type === 'Bot' &&
            comment.body.includes('CI/CD Pipeline')
          );

          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: report
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: report
            });
          }
